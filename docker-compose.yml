# PawLink — Docker stack
#   backend : Node/Express contact API (not published; reached only by `web`)
#   web     : nginx serving the static page + proxying /api -> backend
#
# `web` is published on host port 8080. Your existing host nginx terminates
# SSL for pawlink.psitech.co.in and proxies to http://127.0.0.1:8080
# (see deploy/docker/nginx-host.conf).
#
# Published on host port 8095 (8080/8090 are used by other apps on this VPS).
# Change it if needed:  HOST_WEB_PORT=8096 docker compose up -d

services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env          # create on the VPS from backend/.env.example (holds SMTP_PASS)
    expose:
      - "3000"

  web:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "${HOST_WEB_PORT:-8095}:80"
    volumes:
      - ./deploy/docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - "./PawLink (standalone).html:/usr/share/nginx/html/index.html:ro"
