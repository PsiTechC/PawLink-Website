# PawLink — nginx site config
# Place at: /etc/nginx/sites-available/pawlink
# Enable:   ln -s /etc/nginx/sites-available/pawlink /etc/nginx/sites-enabled/pawlink
# SSL (443) is added automatically by: certbot --nginx -d pawlink.psitech.co.in

server {
    listen 80;
    listen [::]:80;
    server_name pawlink.psitech.co.in;

    # Static landing page (the standalone HTML, copied in as index.html)
    root /var/www/pawlink;
    index index.html;

    # Don't cache the HTML so updates show immediately; cache static assets if any.
    location = /index.html {
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Contact form API -> Node backend (systemd service on 127.0.0.1:3000)
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
