# HOST nginx config — terminates SSL and proxies the domain to the Docker stack.
# Place at: /etc/nginx/sites-available/pawlink
# Enable:   ln -s /etc/nginx/sites-available/pawlink /etc/nginx/sites-enabled/pawlink
# SSL:      certbot --nginx -d pawlink.psitech.co.in   (adds the 443 block automatically)

server {
    listen 80;
    listen [::]:80;
    server_name pawlink.psitech.co.in;

    location / {
        proxy_pass http://127.0.0.1:8080;     # the Docker `web` container
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
